<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YogiTrack Add Package</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <main class="layout--center">
        <form class="card" id="packageForm" >
          <h2>Package Details</h2>
          <fieldset>
            <legend>Package Type</legend>
            <div class="radio-row">
              <label><input type="radio" name="packageType" value="general">General</label>
              <label><input type="radio" name="packageType" value="special">Special</label>
            </div>
          </fieldset>

          <div class="grid-2">
            <label>Package&nbsp;Name
              <input type="text" name="packageName" id="packageName">
            </label>
          </div>

          <label>Description
            <textarea name="description" rows="2"></textarea>
          </label>
    
          <div class="grid-2">
            <label>Price
              <input type="number" name="price" id="price" step="0.01" min="0">
            </label>
          </div>

          <button type="submit" class="btn btn-primary">Save Package</button>
        </form>
    </main>

    <script src="../js/addPackage.js"></script>
</body>
