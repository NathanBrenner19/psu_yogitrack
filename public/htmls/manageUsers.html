<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Users</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="layout--sidebar">
  <!-- Re-use the same sidebar -->
  <aside class="sidebar">
    <a class="logo-wrap" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogaTrack Logo" class="logo">
    </a>
    <nav class="nav">
        <a href="instructor.html">Instructors</a>
        <a href="packages.html">Packages</a>
        <a href="class.html">Class Schedule</a>
        <a href="customer.html">Customers</a>
        <a href="sales.html">Sales</a>
        <a href="#">Check-ins</a>
        <a href="manageUsers.html" id="userManagementLink" style="display: none;">User Management</a>
        <a href="../login.html">Log Out</a>
    </nav>
  </aside>
  <main>
    <div class="overlay">
      <div class="top-bar">
        <h2>User Management</h2>
      </div>
        
      <div class="message" id="message"></div>
      
      <section class="top--layout--center"> 
        <div class="table-responsive-wrapper">
          <table>
            <thead>
              <tr>
                <th>User ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Active</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="userTable"></tbody>
          </table>
        </div>
      </section>

      <div class="btn-row">
        <button class="btn btn--primary" onclick="goToCreateUser()">Create User</button>
        <button class="btn btn--danger" onclick="logout()">Logout</button>
      </div>
    </div>
  </main>

  <script>
    async function loadUsers() {
    const role = localStorage.getItem("role");
    const message = document.getElementById("message");

    if (role !== "admin") {
      message.style.color = "red";
      message.textContent = "Access denied. Admins only.";
      return;
    }

    try {
      const res = await fetch("/api/user/list", {
        headers: {
          "x-user-role": role
        }
      });

      const users = await res.json();

      if (!res.ok) {
        message.style.color = "red";
        message.textContent = users.message || "Could not load users";
        return;
      }

      const table = document.getElementById("userTable");
      table.innerHTML = "";

      users.forEach(user => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${user.userId}</td>
          <td>${user.username}</td>
          <td>${user.email}</td>
          <td>${user.role}</td>
          <td>${user.isActive}</td>
          <td>
              <button class="btn btn--edit" onclick="goToEditUser('${user.userId}')">Edit</button>
              <button class="btn btn--danger" onclick="deleteUser('${user.userId}')">Delete</button>
          </td>
`;

        table.appendChild(row);
      });
    } catch (err) {
      message.style.color = "red";
      message.textContent = "Error connecting to server";
    }
  }

  async function deleteUser(userId) {
    const role = localStorage.getItem("role");

    if (!confirm("Are you sure you want to delete this user?")) {
      return;
    }

    try {
      const res = await fetch(`/api/user/${userId}`, {
        method: "DELETE",
        headers: {
          "x-user-role": role
        }
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.message || "Delete failed");
        return;
      }

      loadUsers();
    } catch (err) {
      alert("Error connecting to server");
    }
  }

  function goToCreateUser() {
    window.location.href = "createUser.html";
  }

  function logout() {
    localStorage.removeItem("username");
    localStorage.removeItem("role");
    localStorage.removeItem("userId");
    window.location.href = "/login.html";
  }

  function goToEditUser(userId) {
       window.location.href = `editUser.html?userId=${userId}`;
  }

  loadUsers();
  </script>
        </div>
    </div>
</body>
</html>
