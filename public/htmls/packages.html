<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YogiTrack Packages</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="layout--sidebar">
  <!-- Re-use the same sidebar -->
  <aside class="sidebar">
    <a class="logo-wrap" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogaTrack Logo" class="logo">
    </a>
  <nav class="nav">
    <a href="instructor.html">Instructors</a>
    <a href="packages.html">Packages</a>
    <a href="#">Class Schedule</a>
    <a href="#">Customers</a>
    <a href="#">Check-ins</a>
    <a href="../index.html">Log Out</a>
  </nav>
  </aside>

  <!-- Package tables -->
  <main>
    <section class="layout--center--top">
      <div class="table-layout">
        <!-- General packages table-->
        <section class="table-card">
          <h1 class="table-title">General Packages</h1>
          <table class="package-table" id="generalPackageTable">
            <thead>
              <tr>
                <th>Package ID</th>
                <th>Package Name</th>
                <th>Description</th>
                <th>Price</th>
              </tr>
            </thead>
            <tbody id="generalPackageTableBody">
              <!-- Rows will be populated by JavaScript -->
            </tbody>
          </table>
          <!-- Buttons for general package table-->
          <div class="btn-row table-btn-row">
            <button type="button" class="btn btn--primary" id="addBtn">New&nbsp;Package</button>
            <button type="button" class="btn btn--danger" id="deleteBtn">Delete&nbsp;Package</button>
          </div>
        </section>

        <!-- Special packages table-->
        <section class="table-card">
          <h1 class="table-title">Special Packages</h1>
          <table class="package-table" id="specialPackageTable">
            <thead>
              <tr>
                <th>Package ID</th>
                <th>Package Name</th>
                <th>Description</th>
                <th>Price</th>
              </tr>
            </thead>
            <tbody id="specialPackageTableBody">
              <!-- Rows will be populated by JavaScript -->
            </tbody>
          </table>
          <!-- Buttons for special package table-->
          <div class="btn-row table-btn-row">
            <button type="button" class="btn btn--primary" id="addSpecialBtn">New&nbsp;Package</button>
            <button type="button" class="btn btn--danger" id="deleteSpecialBtn">Delete&nbsp;Package</button>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script src="../js/packages.js"></script>
</body>
</html>
