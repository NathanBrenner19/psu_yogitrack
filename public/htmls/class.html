<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YogiTrack Class Schedule</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="layout--sidebar">
  <!-- Re-use the same sidebar -->
  <aside class="sidebar">
    <a class="logo-wrap" href="dashboard.html">
      <img src="../images/Logo.png" alt="YogaTrack Logo" class="logo">
    </a>
    <nav class="nav">
        <a href="instructor.html">Instructors</a>
        <a href="packages.html">Packages</a>
        <a href="class.html">Class Schedule</a>
        <a href="customer.html">Customers</a>
        <a href="sales.html">Sales</a>
        <a href="#">Check-ins</a>
        <a href="manageUsers.html" id="userManagementLink" style="display: none;">User Management</a>
        <a href="../login.html">Log Out</a>
    </nav>
  </aside>

  <main>
    <div class="overlay" style="justify-content: center; align-items: center; width: 100%;">
    <form class="card" id="classForm">
        <h2>Class Details</h2>

        <!-- Class Id -->
         <label id="classIdLabel">Class ID
            <select name="classId" id="classIdSelect" class="form-input">
                <option value="">-- Select Class ID --</option>
                <!-- Options will be populated by JavaScript-->
            </select>
         </label>

         
         <label>
            <!-- Toggle with ClassIdLabel -->
            <label id="classIdTextLabel" style="display: none;">Class ID</label>
            <input id="classIdText" type="text" style="display: none;" readonly/>
        </label>


        <div class="grid-2">
            <label>Class Name
                <input type="text" name="className" required>
            </label>
            <label>Instructor ID
                <input type="text" name="instructorId" required>
            </label>
        </div>

        <div class="grid-2">
            <label>Class Type
                <input type="text" name="classType" required>
            </label>
        </div>

        <label> Class Description
            <textarea name="description" rows="2"></textarea>
        </label>

        <label id="classTimes">Day
            <select name="weekDay" id="classTimeSelect" class="form-input">
                <option value="">-- Select WeekDay --</option>
                <!-- Options will be populated by JavaScript-->
            </select>
         </label>

         <label>
            <!-- Toggle with ClassIdLabel -->
            <label id="timeIdTextLabel" style="display: none;">Time ID</label>
            <input id="timeIdText" type="text" style="display: none;" readonly/>
        </label>

        <div class="grid-2">
            <label>Day
                <input type="text" name="day" required>
            </label>
            <label>Time
                <input type="text" name="time" required>
            </label>
        </div>

        <div class="grid-2">
            <label>Duration
                <input type="number" name="duration" required>
            </label>
        </div>

        <!-- Adding buttons to form -->
         <div class="btn-row">
            <button type="submit" class="btn btn--primary" id="addBtn">Save Class</button>
            <button type="button" class="btn btn--danger" id="deleteBtn">Delete Class</button>
         </div>
    </form>
    </div>
  </main>

<script src="../js/class.js"></script>
</body>
</html>
