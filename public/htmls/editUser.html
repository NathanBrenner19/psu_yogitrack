<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function() {
      const role = localStorage.getItem("role");
      if (role !== "admin") {
        alert("Unauthorized access!");
        window.location.href = "../login.html";
      }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit User - YogiTrack</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="layout--top-nav">

  <header class="top-header">
    <div class="logo-wrap">
      <a href="customer.html">
        <img src="../images/TranspLogo.png" alt="YogaTrack Logo" class="logo">
      </a>
    </div>
    <nav class="nav">
        <a href="instructor.html" class="admin-only">Instructors</a>
        <a href="packages.html" class="admin-only">Packages</a>
        <a href="class.html" class="admin-only">Class Schedule</a>
        <a href="customer.html">Customers</a>
        <a href="sales.html">Sales</a>
        <a href="check-in.html">Check-ins</a>
        <a href="manageUsers.html" class="admin-only active">User Management</a>
        <a href="../login.html" class="logout-link">Log Out</a>
    </nav>
  </header>

  <main>
    <div class="overlay">
      <div class="card">
        <h2>Edit User</h2>
        <p class="text--muted" style="margin-bottom: 1.5rem;">Update system access credentials and permissions.</p>

        <div class="grid-2">
          <label>First Name
            <input type="text" id="firstName" class="form-input">
          </label>
          
          <label>Last Name
            <input type="text" id="lastName" class="form-input">
          </label>
        </div>
        
        <label>Username
          <input type="text" id="username" class="form-input">
        </label>
        
        <label>Email
          <input type="email" id="email" class="form-input">
        </label>
        
        <label>Password
          <input type="password" id="password" class="form-input" placeholder="Leave blank to keep current">
        </label>
        
        <div class="grid-2">
          <label>Role
            <select id="role" class="form-input styled-select">
              <option value="admin">Admin</option>
              <option value="instructor">Instructor</option>
            </select>
          </label>

          <label>Account Active
            <select id="isActive" class="form-input styled-select">
              <option value="true">True</option>
              <option value="false">False</option>
            </select>
          </label>
        </div>

        <div class="btn-row">
          <button class="btn btn--secondary" onclick="goBack()">Back</button>
          <button class="btn btn--primary" onclick="updateUser()">Save Changes</button>
        </div>

        <div class="message" id="message" style="margin-top: 1rem; text-align: center; font-weight: 600;"></div>
      </div>
    </div>
  </main>

  <script>
    const role = localStorage.getItem("role");
    if (role !== "admin") {
      window.location.href = "../login.html";
    }

    const params = new URLSearchParams(window.location.search);
    const userId = params.get("userId");

    async function loadUser() {
      const message = document.getElementById("message");

      try {
        const res = await fetch(`/api/user/${userId}`, {
          headers: { "x-user-role": role }
        });

        const user = await res.json();

        if (!res.ok) {
          message.style.color = "var(--danger-red)";
          message.textContent = user.message || "Could not load user";
          return;
        }

        document.getElementById("firstName").value = user.firstName || "";
        document.getElementById("lastName").value = user.lastName || "";
        document.getElementById("username").value = user.username || "";
        document.getElementById("email").value = user.email || "";
        document.getElementById("role").value = user.role || "instructor";
        document.getElementById("isActive").value = String(user.isActive);
      } catch (err) {
        message.style.color = "var(--danger-red)";
        message.textContent = "Error connecting to server";
      }
    }

    async function updateUser() {
      const message = document.getElementById("message");

      const body = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        username: document.getElementById("username").value,
        email: document.getElementById("email").value,
        role: document.getElementById("role").value,
        isActive: document.getElementById("isActive").value === "true"
      };

      const password = document.getElementById("password").value;
      if (password.trim() !== "") {
        body.password = password;
      }

      try {
        const res = await fetch(`/api/user/${userId}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            "x-user-role": role
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (!res.ok) {
          message.style.color = "var(--danger-red)";
          message.textContent = data.message || "Update failed";
          return;
        }

        message.style.color = "var(--accent-green)";
        message.textContent = "User updated successfully";
      } catch (err) {
        message.style.color = "var(--danger-red)";
        message.textContent = "Error connecting to server";
      }
    }

    function goBack() {
      window.location.href = "manageUsers.html";
    }

    loadUser();
  </script>
</body>
</html>
