<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YogiTrack Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 320px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      border: none;
      background: #4b2e83;
      color: white;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #3a2266;
    }

    .message {
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .link-btn {
      background: #777;
    }

    .link-btn:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <div class="background">
    <div class="overlay" style="justify-content: center; align-items: center; width: 100%;">

      <div class="layout--center">
        <div class="card text--center">
          <h2>YogiTrack Login</h2>

          <label>Username</label>
          <input type="text" id="username">

          <label>Password</label>
          <input type="password" id="password">

          <button class="btn btn--primary" onclick="loginUser()">Login</button>

          <div class="message" id="message"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    async function loginUser() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      const message = document.getElementById("message");

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          message.style.color = "red";
          message.textContent = data.message || "Login failed";
          return;
        }

        localStorage.setItem("username", data.user.username);
        localStorage.setItem("role", data.user.role);
        localStorage.setItem("userId", data.user.userId);

        message.style.color = "green";
        message.textContent = "Login successful";

        if (data.user.role === "admin") {
          window.location.href = "htmls/manageUsers.html";
        } else {
          window.location.href = "/index.html";
        }
      } catch (err) {
        message.style.color = "red";
        message.textContent = "Error connecting to server";
      }
    }

    function goToCreateUser() {
      window.location.href = "htmls/createUser.html";
    }
  </script>
</body>
</html>
